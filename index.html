<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hệ thống kết nối nội bộ</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --zalo-blue: #0068ff; --pink: #ff85a2; --danger: #ff3b30; --app-height: 100svh; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, system-ui, sans-serif; height: var(--app-height); overflow: hidden; position: fixed; width: 100%; }
        #login-overlay { position: fixed; inset: 0; background: var(--zalo-blue); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; color: #333; }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; text-align: center; }
        .main-container { position: relative; width: 100%; height: var(--app-height); display: none; flex-direction: column; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        #local-video { position: absolute; top: calc(env(safe-area-inset-top) + 10px); right: 10px; width: 85px; height: 120px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.5); object-fit: cover; z-index: 500; background: #000; transform: scaleX(-1); }
        .zalo-header { position: absolute; top: 0; left: 0; width: 100%; padding: calc(env(safe-area-inset-top) + 15px) 100px 15px 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; align-items: center; z-index: 100; }
        .status-container { display: flex; flex-direction: column; flex: 1; }
        .controls { position: absolute; bottom: calc(env(safe-area-inset-bottom) + 15px); width: 100%; display: flex; justify-content: center; align-items: center; gap: 12px; z-index: 400; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; background: rgba(255,255,255,0.25); color: white; backdrop-filter: blur(10px); }
        .btn-call { background: #4cd964; width: 55px; height: 55px; font-size: 24px; }
        .btn-hangup { background: var(--danger); width: 55px; height: 55px; font-size: 24px; }
        #call-ui-overlay { position: fixed; inset: 0; background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%); z-index: 2500; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 50px 20px; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <h3>Nhập mã xác nhận</h3>
            <input type="number" id="user-id-input" placeholder="Nhập mã (1 hoặc 2)">
            <button onclick="confirmIdentity()" style="width:100%; padding:12px; background:var(--zalo-blue); color:white; border:none; border-radius:10px; font-weight:bold">VÀO HỆ THỐNG</button>
        </div>
    </div>

    <div id="call-ui-overlay">
        <div style="text-align:center">
            <h2 id="call-display-name">Cuộc gọi video</h2>
            <p id="call-status-text">Đang kết nối...</p>
        </div>
        <div id="incoming-actions" style="display:none; gap:60px; justify-content:center; width:100%;">
            <div onclick="answerCall()" style="text-align:center"><div class="circle-btn btn-call">📞</div><p>NHẬN</p></div>
            <div onclick="rejectCall()" style="text-align:center"><div class="circle-btn btn-hangup">✖</div><p>TỪ CHỐI</p></div>
        </div>
        <div id="outgoing-actions" style="display:flex; justify-content:center; width:100%;">
            <div onclick="cancelCall()" style="text-align:center"><div class="circle-btn btn-hangup">✖</div><p>HỦY</p></div>
        </div>
    </div>

    <div class="main-container" id="app-ui">
        <div class="zalo-header">
            <div class="status-container">
                <b id="partner-name-header">Đang kiểm tra...</b>
                <div id="status-text" style="font-size: 11px; opacity: 0.8;">Ngoại tuyến</div>
            </div>
        </div>
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <div class="controls">
            <button class="circle-btn btn-call" id="call-btn" onclick="makeCall()">📞</button>
            <button class="circle-btn btn-hangup" id="hangup-btn" onclick="hangUp()" style="display:none">🛑</button>
        </div>
    </div>

    <script>
        const ID_CHI = "mina_user_1"; const ID_ANH = "mina_user_2";
        let myId, partnerId, peer, localStream, currentCall, dataConn;
        let isPartnerOnline = false, lastOnlineTime = 0;

        function confirmIdentity() {
            const input = document.getElementById('user-id-input').value;
            if(input === "1") { myId = ID_CHI; partnerId = ID_ANH; document.getElementById('partner-name-header').innerText = "Đối phương (2)"; }
            else if(input === "2") { myId = ID_ANH; partnerId = ID_CHI; document.getElementById('partner-name-header').innerText = "Đối phương (1)"; }
            else { alert("Mã không đúng!"); return; }
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            startSystem();
        }

        async function startSystem() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('local-video').srcObject = localStream;
                initPeer();
            } catch (err) { alert("Vui lòng cho phép quyền Camera/Micro!"); }
        }

        function initPeer() {
            // DÙNG PEERJS CLOUD ĐỂ TỰ ĐỘNG CÓ HTTPS
            peer = new Peer(myId, {
                config: { 
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { 
                            urls: 'turn:152.69.214.78:3478', 
                            username: 'tunganh', 
                            credential: 'your_password' // Thay bằng mật khẩu 270799 của bạn
                        }
                    ] 
                } 
            });

            peer.on('open', () => setInterval(checkPartnerStatus, 3000));
            peer.on('call', call => { 
                currentCall = call; 
                document.getElementById('call-ui-overlay').style.display = 'flex'; 
                document.getElementById('incoming-actions').style.display = 'flex'; 
                document.getElementById('outgoing-actions').style.display = 'none'; 
            });
            peer.on('connection', conn => { dataConn = conn; setupDataHandlers(); });
        }

        function checkPartnerStatus() {
            if (currentCall) return;
            const conn = peer.connect(partnerId, { reliable: false });
            conn.on('open', () => { 
                lastOnlineTime = Date.now(); 
                if(!dataConn || !dataConn.open) { dataConn = peer.connect(partnerId); setupDataHandlers(); }
                updateUIStatus(true); 
                conn.close(); 
            });
            setTimeout(() => { if (Date.now() - lastOnlineTime > 7000) updateUIStatus(false); }, 3500);
        }

        function updateUIStatus(online) {
            isPartnerOnline = online;
            const el = document.getElementById('status-text');
            el.innerText = online ? "Đang trực tuyến ❤️" : "Ngoại tuyến";
            el.style.color = online ? "#4cd964" : "#aaa";
        }

        function makeCall() {
            if (!isPartnerOnline) { alert("Người ấy đang ngoại tuyến!"); return; }
            document.getElementById('call-ui-overlay').style.display = 'flex';
            document.getElementById('incoming-actions').style.display = 'none';
            document.getElementById('outgoing-actions').style.display = 'flex';
            const call = peer.call(partnerId, localStream);
            setupCall(call);
        }

        function answerCall() { document.getElementById('call-ui-overlay').style.display = 'none'; currentCall.answer(localStream); setupCall(currentCall); }
        function rejectCall() { if(dataConn) dataConn.send({type: 'BUSY'}); location.reload(); }
        function cancelCall() { if(dataConn) dataConn.send({type: 'CANCEL'}); location.reload(); }

        function setupCall(call) {
            currentCall = call;
            call.on('stream', stream => {
                document.getElementById('call-ui-overlay').style.display = 'none';
                document.getElementById('remote-video').srcObject = stream;
                document.getElementById('call-btn').style.display = 'none';
                document.getElementById('hangup-btn').style.display = 'flex';
            });
            call.on('close', () => location.reload());
        }

        function setupDataHandlers() {
            dataConn.on('data', data => {
                if(data.type === 'END' || data.type === 'CANCEL' || data.type === 'BUSY') location.reload();
            });
        }

        function hangUp() { if(dataConn) dataConn.send({type:'END'}); location.reload(); }
    </script>
</body>
</html>
