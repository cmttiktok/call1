<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Viettel Net - Bèo Control</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* GIỮ NGUYÊN CSS CŨ CỦA ANH VÀ THÊM CÁC DÒNG NÀY */
        :root { --zalo-blue: #0068ff; --pink: #ff85a2; --danger: #ff3b30; }
        
        /* Nâng cấp Mục 2: Giao diện Glassmorphism cho khung chat */
        #chat-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .msg.me { background: var(--zalo-blue); align-self: flex-end; }
        .msg.partner { background: rgba(255,255,255,0.2); align-self: flex-start; }

        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; border: 1px solid #fff; }
        .status-text { font-size: 10px; opacity: 0.7; display: block; text-align: right; margin-top: 2px; }
        
        /* Nút chụp ảnh */
        .btn-snap { background: rgba(255,255,255,0.2); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; color: white; }
    </style>
</head>
<body>
    <div class="controls">
        <button class="control-btn" onclick="toggleMic()" id="mic-btn">🎙️</button>
        <button class="btn-snap" onclick="takeSnapshot()">📸</button>
        <button class="control-btn hangup" onclick="hangUp()">📞</button>
        <button class="control-btn" onclick="switchCamera()">🔄</button>
    </div>

    <script>
        // GIỮ NGUYÊN CÁC BIẾN MYID, PARTNERID VÀ PHẦN LOGIN CỦA ANH
        let offlineQueue = [];
        const CHAT_STORAGE_KEY = 'chat_history_v1';

        // 1. TỰ ĐỘNG LOAD LỊCH SỬ KHI VÀO APP
        window.onload = () => {
            const history = localStorage.getItem(CHAT_STORAGE_KEY);
            if (history) {
                document.getElementById('chat-box').innerHTML = history;
                scrollChat();
            }
        };

        // 2. CHỨC NĂNG CHỤP VÀ GỬI ẢNH (Mục 1 yêu cầu)
        function takeSnapshot() {
            const video = document.getElementById('remote-video');
            if (!video.srcObject) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const base64 = canvas.toDataURL('image/jpeg', 0.5);
            const msgId = 'img-' + Date.now();
            
            appendImage(base64, 'me', msgId);
            if(dataConn && dataConn.open) {
                dataConn.send({ type: 'IMAGE', data: base64, id: msgId });
            }
            saveChat();
        }

        // 3. CẬP NHẬT HÀM GỬI TIN NHẮN (Có báo trạng thái)
        function sendMsg() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            const msgId = 'msg-' + Date.now();
            appendMsg(text, 'me', msgId);

            if(dataConn && dataConn.open) {
                dataConn.send({ type: 'CHAT', text: text, id: msgId });
            } else {
                // Lưu vào hàng chờ nếu đối phương offline
                offlineQueue.push({ type: 'CHAT', text: text, id: msgId });
                document.querySelector(`#${msgId} .status-text`).innerText = 'Chờ gửi...';
            }
            input.value = '';
            saveChat();
        }

        // 4. XỬ LÝ DỮ LIỆU ĐẾN (Báo "Đã xem")
        function setupDataHandlers() {
            dataConn.on('open', () => {
                // Gửi bù tin nhắn khi kết nối lại
                if(offlineQueue.length > 0) {
                    offlineQueue.forEach(m => dataConn.send(m));
                    offlineQueue = [];
                }
            });

            dataConn.on('data', data => {
                if(data.type === 'CHAT') {
                    appendMsg(data.text, 'partner', data.id);
                    dataConn.send({ type: 'SEEN', id: data.id }); // Gửi phản hồi "Đã xem"
                    saveChat();
                } else if(data.type === 'IMAGE') {
                    appendImage(data.data, 'partner', data.id);
                    dataConn.send({ type: 'SEEN', id: data.id });
                    saveChat();
                } else if(data.type === 'SEEN') {
                    const el = document.querySelector(`#${data.id} .status-text`);
                    if(el) el.innerText = '✓ Đã xem';
                    saveChat();
                }
            });
        }

        function appendMsg(text, type, id) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.id = id;
            div.innerHTML = `${text} <span class="status-text"></span>`;
            box.appendChild(div);
            scrollChat();
        }

        function appendImage(base64, type, id) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.id = id;
            div.innerHTML = `<img src="${base64}" class="chat-img"> <span class="status-text"></span>`;
            box.appendChild(div);
            scrollChat();
        }

        function saveChat() {
            localStorage.setItem(CHAT_STORAGE_KEY, document.getElementById('chat-box').innerHTML);
        }

        function scrollChat() {
            const box = document.getElementById('chat-box');
            box.scrollTop = box.scrollHeight;
        }

        // GIỮ NGUYÊN CÁC HÀM switchCamera, toggleMic, hangUp CỦA ANH
    </script>
</body>
</html>
