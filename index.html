<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hệ thống tra cứu đơn hàng Tiktok Shop, Shopee</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --zalo-blue: #0068ff; --pink: #ff85a2; --danger: #ff3b30; --app-height: 100svh; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, system-ui, sans-serif; height: var(--app-height); overflow: hidden; position: fixed; width: 100%; }
        #login-overlay { position: fixed; inset: 0; background: var(--zalo-blue); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; color: #333; }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; text-align: center; }
        .main-container { position: relative; width: 100%; height: var(--app-height); display: none; flex-direction: column; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; background: #111; }
        #local-video { position: absolute; top: calc(env(safe-area-inset-top) + 10px); right: 10px; width: 85px; height: 120px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.5); object-fit: cover; z-index: 500; background: #000; transform: scaleX(-1); }
        .zalo-header { position: absolute; top: 0; left: 0; width: 100%; padding: calc(env(safe-area-inset-top) + 15px) 15px 15px 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; align-items: center; z-index: 100; }
        .status-container { display: flex; flex-direction: column; flex: 1; margin-left: 10px; }
        .controls { position: absolute; bottom: calc(env(safe-area-inset-bottom) + 15px); width: 100%; display: flex; justify-content: center; align-items: center; gap: 12px; z-index: 400; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; background: rgba(255,255,255,0.25); color: white; backdrop-filter: blur(10px); }
        .btn-call { background: #4cd964; width: 55px; height: 55px; font-size: 24px; }
        .btn-hangup { background: var(--danger); width: 55px; height: 55px; font-size: 24px; }
        #call-ui-overlay { position: fixed; inset: 0; background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%); z-index: 2500; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 50px 20px; }
        #chat-box { position: absolute; bottom: 160px; left: 15px; right: 15px; max-height: 20%; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; z-index: 200; pointer-events: none; }
        .msg { padding: 8px 15px; border-radius: 18px; max-width: 75%; font-size: 13px; pointer-events: auto; }
        .msg.partner { background: white; color: #000; align-self: flex-start; }
        .msg.me { background: var(--zalo-blue); color: white; align-self: flex-end; }
        .input-bar { position: absolute; bottom: 95px; left: 15px; right: 15px; display: flex; align-items: center; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 25px; z-index: 300; }
        #chat-input { flex: 1; background: none; border: none; padding: 8px; color: white; outline: none; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <h3>Hệ thống tra cứu đơn hàng</h3>
            <input type="number" id="user-id-input" placeholder="Nhập mã vận đơn">
            <button onclick="confirmIdentity()" style="width:100%; padding:12px; background:var(--zalo-blue); color:white; border:none; border-radius:10px; font-weight:bold">KIỂM TRA</button>
        </div>
    </div>

    <div id="call-ui-overlay">
        <div style="text-align:center">
            <div style="width:120px; height:120px; background:var(--pink); border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:50px;">❤️</div>
            <h2 id="call-display-name">Người ấy</h2>
            <p id="call-status-text">Đang kết nối...</p>
        </div>
        <div id="call-actions" style="display:flex; gap:40px;">
            <button onclick="answerCall()" class="circle-btn btn-call">📞</button>
            <button onclick="rejectCall()" class="circle-btn btn-hangup">✖</button>
        </div>
    </div>

    <div class="main-container" id="app-ui">
        <div class="zalo-header">
            <div class="status-container">
                <b id="partner-name-header">...</b>
                <div id="status-text" style="font-size: 11px;">Đang kiểm tra...</div>
            </div>
        </div>
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <div id="chat-box"></div>
        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="Tin nhắn..." onkeypress="if(event.key==='Enter') sendMsg()">
            <span onclick="sendMsg()" style="font-size:20px;">🚀</span>
        </div>
        <div class="controls">
            <button class="circle-btn" onclick="switchCamera()">🔄</button>
            <button class="circle-btn btn-call" id="call-btn" onclick="makeCall()">📞</button>
            <button class="circle-btn btn-hangup" id="hangup-btn" onclick="hangUp()" style="display:none">🛑</button>
        </div>
    </div>

    <script>
        const ID_CHI = "mina_user_1"; const ID_ANH = "mina_user_2";
        let myId, partnerId, peer, localStream, currentCall, dataConn;
        let lastPartnerSeen = 0;

        function confirmIdentity() {
            const input = document.getElementById('user-id-input').value;
            if(input === "1") { myId = ID_CHI; partnerId = ID_ANH; document.getElementById('partner-name-header').innerText = "Anh ❤️"; }
            else if(input === "2") { myId = ID_ANH; partnerId = ID_CHI; document.getElementById('partner-name-header').innerText = "Bé Chi 🌸"; }
            else { alert("Sai mã!"); return; }
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            startSystem();
        }

        async function startSystem() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('local-video').srcObject = localStream;
            } catch (e) { console.log("Cam error", e); }
            initPeer();
        }

        function initPeer() {
            // Cấu hình tối giản tuyệt đối để tránh lỗi khởi tạo
            peer = new Peer(myId, {
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
                    ]
                }
            });

            peer.on('open', () => setInterval(pingPartner, 4000));
            peer.on('connection', conn => { dataConn = conn; setupDataHandlers(); });
            peer.on('call', call => {
                currentCall = call;
                document.getElementById('call-ui-overlay').style.display = 'flex';
            });
        }

        function pingPartner() {
            const conn = peer.connect(partnerId, { reliable: false });
            conn.on('open', () => {
                lastPartnerSeen = Date.now();
                updateUI(true);
                conn.close();
            });
            if (Date.now() - lastPartnerSeen > 10000) updateUI(false);
        }

        function updateUI(online) {
            const el = document.getElementById('status-text');
            el.innerText = online ? "Đang trực tuyến ❤️" : "Ngoại tuyến";
            el.style.color = online ? "#4cd964" : "#aaa";
        }

        function makeCall() {
            document.getElementById('call-ui-overlay').style.display = 'flex';
            document.getElementById('call-status-text').innerText = "Đang gọi...";
            const call = peer.call(partnerId, localStream);
            setupCall(call);
        }

        function answerCall() {
            document.getElementById('call-ui-overlay').style.display = 'none';
            currentCall.answer(localStream);
            setupCall(currentCall);
        }

        function setupCall(call) {
            currentCall = call;
            call.on('stream', stream => {
                document.getElementById('call-ui-overlay').style.display = 'none';
                document.getElementById('remote-video').srcObject = stream;
                document.getElementById('call-btn').style.display = 'none';
                document.getElementById('hangup-btn').style.display = 'flex';
            });
            call.on('close', () => location.reload());
        }

        function setupDataHandlers() {
            dataConn.on('data', data => {
                if(data.type === 'CHAT') appendMsg(data.text, 'partner');
                if(data.type === 'END') location.reload();
            });
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() && dataConn && dataConn.open) {
                dataConn.send({ type: 'CHAT', text: input.value });
                appendMsg(input.value, 'me');
                input.value = '';
            }
        }

        function appendMsg(text, type) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${type}`; div.innerText = text;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function hangUp() { if(dataConn) dataConn.send({type:'END'}); location.reload(); }
        function rejectCall() { document.getElementById('call-ui-overlay').style.display = 'none'; }
        function switchCamera() { /* Logic đơn giản để switch camera */ }
    </script>
</body>
</html>
