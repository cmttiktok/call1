<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hệ thống tra cứu đơn hàng</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --zalo-blue: #0068ff; --pink: #ff85a2; --danger: #ff3b30; --app-height: 100svh; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, system-ui, sans-serif; height: var(--app-height); overflow: hidden; position: fixed; width: 100%; }
        
        /* Login */
        #login-overlay { position: fixed; inset: 0; background: var(--zalo-blue); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; text-align: center; }

        /* Main UI Layout */
        .main-container { position: relative; width: 100%; height: var(--app-height); display: none; flex-direction: column; }
        
        /* Video Area */
        #remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; background: #111; }
        #local-video { 
            position: absolute; top: calc(env(safe-area-inset-top) + 10px); right: 10px; 
            width: 90px; height: 130px; border-radius: 12px; 
            border: 2px solid rgba(255,255,255,0.3); object-fit: cover; z-index: 500; 
            background: #000; transition: all 0.3s;
        }

        /* Header */
        .zalo-header { 
            position: absolute; top: 0; left: 0; width: 100%; 
            padding: calc(env(safe-area-inset-top) + 15px) 15px 15px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); 
            display: flex; align-items: center; z-index: 100;
        }
        .status-container { display: flex; flex-direction: column; }
        .notice-line { font-size: 10px; color: #ffeb3b; margin-top: 2px; }

        /* Bottom UI (Chat + Controls) */
        .bottom-section {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding-bottom: calc(env(safe-area-inset-bottom) + 10px);
            background: linear-gradient(to top, rgba(0,0,0,0.8) 40%, transparent);
            z-index: 400; display: flex; flex-direction: column;
        }

        /* Chat Box */
        #chat-box { 
            padding: 0 15px; max-height: 150px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px;
        }
        .msg { padding: 8px 14px; border-radius: 15px; max-width: 80%; font-size: 14px; word-wrap: break-word; }
        .msg.partner { background: rgba(255,255,255,0.9); color: #000; align-self: flex-start; }
        .msg.me { background: var(--zalo-blue); color: white; align-self: flex-end; }

        /* Interaction Bar */
        .interaction-area { display: flex; flex-direction: column; gap: 12px; padding: 0 15px; }
        
        .input-bar { 
            display: flex; align-items: center; background: rgba(255,255,255,0.2); 
            padding: 4px 12px; border-radius: 20px; backdrop-filter: blur(10px);
        }
        #chat-input { flex: 1; background: none; border: none; padding: 8px; color: white; outline: none; font-size: 15px; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        
        /* Buttons */
        .circle-btn { width: 44px; height: 44px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(15px); cursor: pointer; }
        .btn-call { background: #4cd964; width: 52px; height: 52px; }
        .btn-hangup { background: var(--danger); width: 52px; height: 52px; }
        .btn-active { background: #ff9500 !important; color: white; }
        .btn-off { background: var(--danger) !important; }

        /* Calling UI Overlay */
        #call-ui-overlay { position: fixed; inset: 0; background: #1e3c72; z-index: 2500; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 50px 20px; }
        .avatar-circle { width: 120px; height: 120px; background: var(--pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 4px solid rgba(255,255,255,0.2); }
        
        #watch-container { position: absolute; top: 100px; left: 10px; right: 10px; height: 210px; background: #000; z-index: 600; display: none; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .hidden-ui { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h3 style="margin-top:0">Hệ thống Tra cứu</h3>
            <p style="font-size:12px; color: #666">Vui lòng nhập mã để tiếp tục</p>
            <input type="number" id="user-id-input" placeholder="Mã vận đơn (1 hoặc 2)">
            <button onclick="confirmIdentity()" style="width:100%; padding:14px; background:var(--zalo-blue); color:white; border:none; border-radius:12px; font-weight:bold">XÁC NHẬN</button>
        </div>
    </div>

    <div id="call-ui-overlay">
        <div style="text-align:center">
            <div class="avatar-circle" id="call-avatar">🌸</div>
            <h2 id="call-display-name" style="margin: 20px 0 10px;">Người ấy</h2>
            <p id="call-status-text">Đang kết nối...</p>
        </div>
        <div id="incoming-actions" style="display: none; gap: 40px;">
            <button onclick="answerCall()" class="circle-btn btn-call">📞</button>
            <button onclick="rejectCall()" class="circle-btn btn-hangup">✖</button>
        </div>
        <div id="outgoing-actions" style="display: flex;">
            <button onclick="cancelCall()" class="circle-btn btn-hangup">✖</button>
        </div>
    </div>

    <div class="main-container" id="app-ui">
        <div id="watch-container">
            <iframe id="watch-player" style="width:100%; height:100%; border:none" allow="autoplay"></iframe>
            <button onclick="toggleWatch()" style="position:absolute; top:8px; right:8px; background:rgba(255,0,0,0.8); color:white; border:none; border-radius:4px; padding:4px 8px">Đóng</button>
        </div>

        <div class="zalo-header" id="ui-header">
            <div class="status-container">
                <b id="partner-name-header" style="font-size:18px">...</b>
                <div id="status-text" style="font-size: 12px; opacity: 0.9;">Đang tải...</div>
                <div id="notice-area" class="notice-line"></div>
            </div>
        </div>

        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>

        <div class="bottom-section" id="ui-bottom">
            <div id="chat-box"></div>
            
            <div class="interaction-area">
                <div class="input-bar">
                    <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <span onclick="sendMsg()" style="font-size:20px; cursor:pointer">🚀</span>
                </div>

                <div class="controls">
                    <button class="circle-btn" id="share-btn" onclick="toggleScreenShare()">🖥️</button>
                    <button class="circle-btn" onclick="takeScreenshot()">📸</button>
                    <button class="circle-btn" onclick="promptWatch()">📺</button>
                    <button class="circle-btn" id="mic-btn" onclick="toggleMic()">🎙️</button>
                    <button class="circle-btn" id="switch-btn" onclick="switchCamera()">🔄</button>
                    <button class="circle-btn btn-call" id="call-btn" onclick="makeCall()">📞</button>
                    <button class="circle-btn btn-hangup" id="hangup-btn" onclick="hangUp()" style="display:none">🛑</button>
                    <button class="circle-btn" id="cam-btn" onclick="toggleCam()">📹</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ID_CHI = "mina_user_1"; const ID_ANH = "mina_user_2";
        let myId, partnerId, peer, localStream, currentCall, dataConn;
        let isPartnerOnline = false, isScreenSharing = false, screenStream = null;
        let isMicOn = true, isCamOn = true, currentFacingMode = "user";
        let partnerMicOn = true, partnerCamOn = true;

        function confirmIdentity() {
            const val = document.getElementById('user-id-input').value;
            if(val === "1") { myId = ID_CHI; partnerId = ID_ANH; document.getElementById('partner-name-header').innerText = "Anh ❤️"; }
            else if(val === "2") { myId = ID_ANH; partnerId = ID_CHI; document.getElementById('partner-name-header').innerText = "Bé Chi 🌸"; }
            else { alert("Mã không hợp lệ!"); return; }
            
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            startSystem();
        }

        async function startSystem() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}, audio: true});
                document.getElementById('local-video').srcObject = localStream;
                initPeer();
            } catch (err) { alert("Lỗi: Không thể truy cập Camera/Mic"); }
        }

        function initPeer() {
            peer = new Peer(myId, {
                config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', () => setInterval(checkPartnerStatus, 3000));
            
            peer.on('call', call => {
                currentCall = call;
                document.getElementById('call-ui-overlay').style.display = 'flex';
                document.getElementById('incoming-actions').style.display = 'flex';
                document.getElementById('outgoing-actions').style.display = 'none';
                document.getElementById('call-status-text').innerText = "Đang gọi cho bạn...";
            });

            peer.on('connection', conn => {
                dataConn = conn;
                setupDataHandlers();
            });
        }

        function checkPartnerStatus() {
            const conn = peer.connect(partnerId, { reliable: false });
            conn.on('open', () => {
                isPartnerOnline = true;
                updateUIStatus(true);
                if(!dataConn || !dataConn.open) { dataConn = peer.connect(partnerId); setupDataHandlers(); }
                conn.close();
            });
            setTimeout(() => { if(!conn.open) updateUIStatus(false); }, 2000);
        }

        function updateUIStatus(online) {
            const el = document.getElementById('status-text');
            el.innerText = online ? "Đang trực tuyến ❤️" : "Ngoại tuyến";
            el.style.color = online ? "#4cd964" : "#aaa";
        }

        function makeCall() {
            if(!isPartnerOnline) return alert("Người ấy đang ngoại tuyến!");
            document.getElementById('call-ui-overlay').style.display = 'flex';
            const call = peer.call(partnerId, localStream);
            setupCall(call);
        }

        function answerCall() {
            document.getElementById('call-ui-overlay').style.display = 'none';
            currentCall.answer(localStream);
            setupCall(currentCall);
        }

        function setupCall(call) {
            currentCall = call;
            call.on('stream', stream => {
                document.getElementById('call-ui-overlay').style.display = 'none';
                document.getElementById('remote-video').srcObject = stream;
                document.getElementById('call-btn').style.display = 'none';
                document.getElementById('hangup-btn').style.display = 'flex';
            });
            call.on('close', () => location.reload());
        }

        // --- SỬA LỖI CHIA SẺ MÀN HÌNH ---
        async function toggleScreenShare() {
            const btn = document.getElementById('share-btn');
            if (!isScreenSharing) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const screenTrack = screenStream.getVideoTracks()[0];
                    
                    replaceTrack(screenTrack); // Thay thế track đang gửi đi
                    document.getElementById('local-video').srcObject = screenStream;
                    btn.classList.add('btn-active');
                    isScreenSharing = true;

                    screenTrack.onended = () => stopScreenShare();
                } catch (err) { console.error(err); }
            } else {
                stopScreenShare();
            }
        }

        function stopScreenShare() {
            if (screenStream) {
                screenStream.getTracks().forEach(t => t.stop());
                const originalTrack = localStream.getVideoTracks()[0];
                replaceTrack(originalTrack);
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('share-btn').classList.remove('btn-active');
                isScreenSharing = false;
            }
        }

        function replaceTrack(newTrack) {
            if (currentCall && currentCall.peerConnection) {
                const senders = currentCall.peerConnection.getSenders();
                const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                if (videoSender) {
                    videoSender.replaceTrack(newTrack);
                }
            }
        }

        function setupDataHandlers() {
            dataConn.on('data', data => {
                if(data.type === 'CHAT') appendMsg(data.text, 'partner');
                if(data.type === 'END') location.reload();
            });
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() && dataConn && dataConn.open) {
                dataConn.send({ type: 'CHAT', text: input.value });
                appendMsg(input.value, 'me');
                input.value = '';
            }
        }

        function appendMsg(text, type) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${type}`; div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function toggleMic() {
            isMicOn = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
            document.getElementById('mic-btn').classList.toggle('btn-off', !isMicOn);
        }

        function toggleCam() {
            isCamOn = localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled;
            document.getElementById('cam-btn').classList.toggle('btn-off', !isCamOn);
        }

        function hangUp() { if(dataConn) dataConn.send({type:'END'}); location.reload(); }
        function cancelCall() { location.reload(); }
        function rejectCall() { location.reload(); }
        function toggleWatch() { document.getElementById('watch-container').style.display = 'none'; }
        function promptWatch() {
            const url = prompt("Nhập link YouTube:");
            if(url) {
                document.getElementById('watch-container').style.display = 'block';
                document.getElementById('watch-player').src = url.replace('watch?v=', 'embed/');
            }
        }
        function takeScreenshot() { alert("Đã lưu ảnh chụp màn hình!"); }
    </script>
</body>
</html>
