<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hệ thống tra cứu đơn hàng Tiktok Shop, Shopee</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --zalo-blue: #0068ff; --pink: #ff85a2; --danger: #ff3b30; --app-height: 100svh; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, system-ui, sans-serif; height: var(--app-height); overflow: hidden; position: fixed; width: 100%; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--zalo-blue); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; color: #333; }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; text-align: center; }
        
        .main-container { position: relative; width: 100%; height: var(--app-height); display: none; flex-direction: column; transition: transform 0.3s ease; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        #local-video { position: absolute; top: calc(env(safe-area-inset-top) + 10px); right: 10px; width: 85px; height: 120px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.5); object-fit: cover; z-index: 500; background: #000; transform: scaleX(-1); }
        
        .zalo-header { position: absolute; top: 0; left: 0; width: 100%; padding: calc(env(safe-area-inset-top) + 15px) 100px 15px 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; align-items: center; z-index: 100; transition: opacity 0.3s; }
        .controls { position: absolute; bottom: calc(env(safe-area-inset-bottom) + 15px); width: 100%; display: flex; justify-content: center; align-items: center; gap: 12px; z-index: 400; transition: opacity 0.3s; }
        
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; background: rgba(255,255,255,0.25); color: white; backdrop-filter: blur(10px); }
        
        #chat-box { position: absolute; bottom: 160px; left: 15px; right: 15px; max-height: 20%; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; pointer-events: none; z-index: 200; transition: opacity 0.3s; }
        .msg { padding: 8px 15px; border-radius: 18px; max-width: 75%; font-size: 13px; pointer-events: auto; }
        .msg.partner { background: white; color: #000; align-self: flex-start; }
        .msg.me { background: var(--zalo-blue); color: white; align-self: flex-end; }

        /* Watch Together Container */
        #watch-container { position: absolute; top: 100px; left: 15px; right: 15px; height: 200px; background: #000; z-index: 600; display: none; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        #watch-player { width: 100%; height: 100%; border: none; }
        
        .blur-video { filter: blur(10px); }
        .hidden-ui { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body id="body-main">
    <div id="login-overlay">
        <div class="login-card">
            <h3>Hệ thống tra cứu đơn hàng</h3>
            <input type="number" id="user-id-input" placeholder="Nhập mã vận đơn">
            <button onclick="confirmIdentity()" style="width:100%; padding:12px; background:var(--zalo-blue); color:white; border:none; border-radius:10px;">KIỂM TRA</button>
        </div>
    </div>

    <div class="main-container" id="app-ui">
        <div id="watch-container">
            <iframe id="watch-player" allow="autoplay"></iframe>
            <button onclick="toggleWatch()" style="position:absolute; top:5px; right:5px; background:red; color:white; border:none; border-radius:5px;">X</button>
        </div>

        <div class="zalo-header" id="ui-header">
            <div style="flex:1">
                <b id="partner-name-header">Đối phương</b>
                <div id="call-timer" style="font-size: 12px; color: #4cd964;">00:00</div>
            </div>
        </div>

        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div id="chat-box"></div>

        <div class="controls" id="ui-controls">
            <button class="circle-btn" onclick="toggleBlur()">✨</button>
            <button class="circle-btn" onclick="takeScreenshot()">📸</button>
            <button class="circle-btn" onclick="promptWatch()">📺</button>
            <button class="circle-btn btn-hangup" style="background:var(--danger)" onclick="hangUp()">🛑</button>
        </div>
    </div>

    <script>
        const ID_CHI = "mina_user_1"; const ID_ANH = "mina_user_2";
        let myId, partnerId, peer, localStream, currentCall, dataConn;
        let timerInterval, secondsElapsed = 0;
        let startX = 0;

        function confirmIdentity() {
            const input = document.getElementById('user-id-input').value;
            if(input === "1") { myId = ID_CHI; partnerId = ID_ANH; }
            else if(input === "2") { myId = ID_ANH; partnerId = ID_CHI; }
            else { alert("Sai mã!"); return; }
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            startSystem();
        }

        async function startSystem() {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('local-video').srcObject = localStream;
            initPeer();
        }

        function initPeer() {
            peer = new Peer(myId, {
                config: { 'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'turn:152.69.214.78:3478', username: 'tunganh', credential: 'your_password' }
                ] }
            });

            peer.on('call', call => {
                if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
                if(confirm("Có cuộc gọi đến từ đối phương!")) {
                    call.answer(localStream);
                    setupCall(call);
                    requestFullScreen();
                }
            });

            peer.on('connection', conn => {
                dataConn = conn;
                dataConn.on('data', data => {
                    if(data.type === 'WATCH') startWatching(data.url);
                    if(data.type === 'END') location.reload();
                });
            });
        }

        function setupCall(call) {
            currentCall = call;
            startTimer();
            call.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
            });
        }

        // --- Nâng cấp: Đồng hồ HH:MM:SS ---
        function startTimer() {
            timerInterval = setInterval(() => {
                secondsElapsed++;
                let hrs = Math.floor(secondsElapsed / 3600);
                let mins = Math.floor((secondsElapsed % 3600) / 60);
                let secs = secondsElapsed % 60;
                let display = "";
                if (hrs > 0) display += (hrs < 10 ? "0" + hrs : hrs) + ":";
                display += (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
                document.getElementById('call-timer').innerText = display;
            }, 1000);
        }

        // --- Nâng cấp: Vuốt ẩn UI ---
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if (endX - startX > 100) toggleUI(false); // Vuốt phải ẩn
            if (startX - endX > 100) toggleUI(true);  // Vuốt trái hiện
        });

        function toggleUI(show) {
            const classAction = show ? 'remove' : 'add';
            document.getElementById('ui-header').classList[classAction]('hidden-ui');
            document.getElementById('ui-controls').classList[classAction]('hidden-ui');
            document.getElementById('chat-box').classList[classAction]('hidden-ui');
        }

        // --- Nâng cấp: Toàn màn hình ---
        function requestFullScreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }

        // --- Nâng cấp: Làm mờ & Chụp ảnh ---
        function toggleBlur() { document.getElementById('local-video').classList.toggle('blur-video'); }
        
        function takeScreenshot() {
            const video = document.getElementById('remote-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const link = document.createElement('a');
            link.download = 'screenshot.png'; link.href = canvas.toDataURL();
            link.click();
        }

        // --- Nâng cấp: Xem phim chung ---
        function promptWatch() {
            const url = prompt("Dán link video (YouTube/MP4):");
            if (url) {
                startWatching(url);
                if(dataConn) dataConn.send({ type: 'WATCH', url: url });
            }
        }
        function startWatching(url) {
            const container = document.getElementById('watch-container');
            const player = document.getElementById('watch-player');
            container.style.display = 'block';
            player.src = url.includes('youtube.com') ? url.replace('watch?v=', 'embed/') : url;
        }
        function toggleWatch() { document.getElementById('watch-container').style.display = 'none'; }

        function hangUp() { if(dataConn) dataConn.send({type:'END'}); location.reload(); }
    </script>
</body>
</html>
